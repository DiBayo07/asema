<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Вход — АЛГА Панель</title>
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>
  <div class="box">
    <div class="brand"><span class="brand-text">АЛ</span></div>
    <div class="title">Панель администратора</div>
    <div class="subtitle">Спортивный комплекс АЛГА</div>
    <form method="POST" action="/admin/login">
      <div class="form-group">
        <label>Логин</label>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input type="text" name="login" placeholder="Введите логин" autofocus>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" name="password" placeholder="Введите пароль">
      </div>
      <button type="submit">Войти</button>
      {% if error %}<div class="error">Неверный логин или пароль</div>{% endif %}
      {% if blocked %}<div class="error blocked">Доступ временно ограничен. Повторите через {{ blocked }} мин.</div>{% endif %}
    </form>
    <div class="footer-text">АЛГА — Панель управления</div>
  </div>
</body>
</html>
